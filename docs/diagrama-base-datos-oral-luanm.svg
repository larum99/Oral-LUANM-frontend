<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200" role="img" aria-labelledby="title desc">
  <title id="title">Diagrama de base de datos ORAL LUANM</title>
  <desc id="desc">Mapa entidad relación para usuarios, pacientes, especialistas, citas e historias clínicas.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0f172a" flood-opacity=".12"/>
    </filter>
    <style>
      .bg{fill:#f8fafc}.title{font:700 30px Inter,Arial,sans-serif;fill:#0f172a}.subtitle{font:18px Inter,Arial,sans-serif;fill:#475569}
      .box{fill:#fff;stroke-width:2;rx:10;filter:url(#shadow)}.head{opacity:.14}.name{font:700 17px Inter,Arial,sans-serif;fill:#172033}
      .field{font:13px Consolas,monospace;fill:#334155}.key{font-weight:700;fill:#b7791f}.fk{font-weight:700;fill:#2563eb}
      .rel{fill:none;stroke:#64748b;stroke-width:2}.card{fill:#fff;stroke:#cbd5e1;stroke-width:1.5;rx:10}
      .note{font:13px Inter,Arial,sans-serif;fill:#475569}.legend{font:12px Inter,Arial,sans-serif;fill:#334155}
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect class="bg" width="1800" height="1200"/>
  <text class="title" x="900" y="45" text-anchor="middle">DIAGRAMA DE BASE DE DATOS</text>
  <text class="subtitle" x="900" y="73" text-anchor="middle">PLATAFORMA ODONTOLÓGICA ORAL LUANM</text>

  <!-- Relaciones (dibujadas detrás de las tablas) -->
  <g marker-end="url(#arrow)">
    <path class="rel" d="M250 275 V315 H470 V350"/>
    <path class="rel" d="M250 275 V315 H170 V350"/>
    <path class="rel" d="M250 275 V315 H770 V350"/>
    <path class="rel" d="M530 225 H610 V180 H690"/>
    <path class="rel" d="M830 300 V330 H920 V350"/>
    <path class="rel" d="M830 300 V330 H1165 V350"/>
    <path class="rel" d="M1180 300 V330 H1040 V350"/>
    <path class="rel" d="M1035 540 V580 H820 V615"/>
    <path class="rel" d="M830 540 V580 H820 V615"/>
    <path class="rel" d="M530 540 V580 H710 V615"/>
    <path class="rel" d="M820 845 V885 H490 V920"/>
    <path class="rel" d="M820 845 V885 H790 V920"/>
    <path class="rel" d="M820 845 V885 H1090 V920"/>
    <path class="rel" d="M170 540 V885 H490 V920"/>
    <path class="rel" d="M1090 1090 H1240 V845 H980"/>
    <path class="rel" d="M250 275 V880 H1390 V920"/>
  </g>

  <!-- Fila superior -->
  <g transform="translate(70 105)">
    <rect class="box" width="360" height="170" stroke="#315fbd"/>
    <rect class="head" width="360" height="40" fill="#315fbd"/>
    <text class="name" x="18" y="26">usuarios</text>
    <text class="field key" x="18" y="65">PK  id_usuario        BIGSERIAL</text>
    <text class="field fk" x="18" y="87">FK  id_rol            SMALLINT</text>
    <text class="field" x="18" y="109">    nombre, apellido   VARCHAR</text>
    <text class="field" x="18" y="131">    email              VARCHAR UNIQUE</text>
    <text class="field" x="18" y="153">    password_hash / estado / ultimo_login</text>
  </g>

  <g transform="translate(690 105)">
    <rect class="box" width="280" height="195" stroke="#7c3aed"/>
    <rect class="head" width="280" height="40" fill="#7c3aed"/>
    <text class="name" x="18" y="26">roles</text>
    <text class="field key" x="18" y="65">PK  id_rol       SMALLSERIAL</text>
    <text class="field" x="18" y="87">    nombre       VARCHAR UNIQUE</text>
    <text class="field" x="18" y="109">    descripcion  VARCHAR</text>
    <text class="note" x="18" y="145">ADMIN · SECRETARIO</text>
    <text class="note" x="18" y="166">ESPECIALISTA · PACIENTE</text>
  </g>

  <g transform="translate(1040 105)">
    <rect class="box" width="280" height="195" stroke="#7c3aed"/>
    <rect class="head" width="280" height="40" fill="#7c3aed"/>
    <text class="name" x="18" y="26">permisos</text>
    <text class="field key" x="18" y="65">PK  id_permiso   SMALLSERIAL</text>
    <text class="field" x="18" y="87">    codigo       VARCHAR UNIQUE</text>
    <text class="field" x="18" y="109">    descripcion  VARCHAR</text>
    <text class="note" x="18" y="145">Accesos de citas, pacientes,</text>
    <text class="note" x="18" y="166">especialistas e historias clínicas</text>
  </g>

  <g transform="translate(1410 105)">
    <rect class="box" width="320" height="170" stroke="#7c3aed"/>
    <rect class="head" width="320" height="40" fill="#7c3aed"/>
    <text class="name" x="18" y="26">roles_permisos</text>
    <text class="field key" x="18" y="65">PK/FK  id_rol       SMALLINT</text>
    <text class="field key" x="18" y="87">PK/FK  id_permiso   SMALLINT</text>
    <text class="note" x="18" y="125">Relación muchos a muchos</text>
    <text class="note" x="18" y="147">entre roles y permisos.</text>
  </g>

  <!-- Fila media -->
  <g transform="translate(40 350)">
    <rect class="box" width="360" height="190" stroke="#8b5cf6"/>
    <rect class="head" width="360" height="40" fill="#8b5cf6"/>
    <text class="name" x="18" y="26">pacientes</text>
    <text class="field key" x="18" y="65">PK  id_paciente       BIGSERIAL</text>
    <text class="field fk" x="18" y="87">FK  id_usuario        BIGINT UNIQUE</text>
    <text class="field" x="18" y="109">    tipo_documento    VARCHAR</text>
    <text class="field" x="18" y="131">    numero_documento  VARCHAR UNIQUE</text>
    <text class="field" x="18" y="153">    fecha_nacimiento  DATE</text>
    <text class="field" x="18" y="175">    acepta_datos / promociones</text>
  </g>

  <g transform="translate(450 350)">
    <rect class="box" width="360" height="190" stroke="#16a34a"/>
    <rect class="head" width="360" height="40" fill="#16a34a"/>
    <text class="name" x="18" y="26">especialistas</text>
    <text class="field key" x="18" y="65">PK  id_especialista   BIGSERIAL</text>
    <text class="field fk" x="18" y="87">FK  id_usuario        BIGINT UNIQUE</text>
    <text class="field" x="18" y="109">    especialidad      VARCHAR</text>
    <text class="field" x="18" y="131">    registro_profesional VARCHAR UNIQUE</text>
    <text class="field" x="18" y="153">    estado            ACTIVO / INACTIVO</text>
    <text class="field" x="18" y="175">    fecha_creacion    TIMESTAMPTZ</text>
  </g>

  <g transform="translate(860 350)">
    <rect class="box" width="350" height="190" stroke="#0f766e"/>
    <rect class="head" width="350" height="40" fill="#0f766e"/>
    <text class="name" x="18" y="26">servicios</text>
    <text class="field key" x="18" y="65">PK  id_servicio       BIGSERIAL</text>
    <text class="field" x="18" y="87">    nombre            VARCHAR UNIQUE</text>
    <text class="field" x="18" y="109">    descripcion       TEXT</text>
    <text class="field" x="18" y="131">    duracion_minutos  SMALLINT</text>
    <text class="field" x="18" y="153">    precio            NUMERIC(12,2)</text>
    <text class="field" x="18" y="175">    estado            ACTIVO / INACTIVO</text>
  </g>

  <g transform="translate(1260 350)">
    <rect class="box" width="470" height="190" stroke="#16a34a"/>
    <rect class="head" width="470" height="40" fill="#16a34a"/>
    <text class="name" x="18" y="26">horarios_especialistas</text>
    <text class="field key" x="18" y="65">PK  id_horario        BIGSERIAL</text>
    <text class="field fk" x="18" y="87">FK  id_especialista   BIGINT</text>
    <text class="field" x="18" y="109">    dia_semana        SMALLINT (1–7)</text>
    <text class="field" x="18" y="131">    hora_inicio       TIME</text>
    <text class="field" x="18" y="153">    hora_fin          TIME</text>
    <text class="field" x="18" y="175">    activo            BOOLEAN</text>
  </g>

  <!-- Cita central -->
  <g transform="translate(570 615)">
    <rect class="box" width="500" height="230" stroke="#ea580c"/>
    <rect class="head" width="500" height="40" fill="#ea580c"/>
    <text class="name" x="18" y="26">citas</text>
    <text class="field key" x="18" y="65">PK  id_cita             BIGSERIAL</text>
    <text class="field fk" x="18" y="87">FK  id_paciente         BIGINT</text>
    <text class="field fk" x="18" y="109">FK  id_especialista     BIGINT</text>
    <text class="field fk" x="18" y="131">FK  id_servicio / creada_por</text>
    <text class="field" x="18" y="153">    fecha_hora_inicio / fecha_hora_fin</text>
    <text class="field" x="18" y="175">    motivo / observaciones</text>
    <text class="field" x="18" y="197">    estado  PENDIENTE · CONFIRMADA · ATENDIDA</text>
    <text class="field" x="18" y="219">            CANCELADA · NO_ASISTIO</text>
  </g>

  <g transform="translate(1120 615)">
    <rect class="box" width="390" height="190" stroke="#0f766e"/>
    <rect class="head" width="390" height="40" fill="#0f766e"/>
    <text class="name" x="18" y="26">especialistas_servicios</text>
    <text class="field key" x="18" y="65">PK/FK  id_especialista  BIGINT</text>
    <text class="field key" x="18" y="87">PK/FK  id_servicio      BIGINT</text>
    <text class="note" x="18" y="127">Define cuáles servicios puede</text>
    <text class="note" x="18" y="149">prestar cada especialista.</text>
  </g>

  <!-- Fila inferior -->
  <g transform="translate(40 920)">
    <rect class="box" width="410" height="190" stroke="#2563eb"/>
    <rect class="head" width="410" height="40" fill="#2563eb"/>
    <text class="name" x="18" y="26">historias_clinicas</text>
    <text class="field key" x="18" y="65">PK  id_historia       BIGSERIAL</text>
    <text class="field fk" x="18" y="87">FK  id_paciente       BIGINT UNIQUE</text>
    <text class="field" x="18" y="109">    antecedentes      TEXT</text>
    <text class="field" x="18" y="131">    alergias          TEXT</text>
    <text class="field" x="18" y="153">    observaciones     TEXT</text>
    <text class="field" x="18" y="175">    fecha_actualizacion TIMESTAMPTZ</text>
  </g>

  <g transform="translate(490 920)">
    <rect class="box" width="470" height="190" stroke="#2563eb"/>
    <rect class="head" width="470" height="40" fill="#2563eb"/>
    <text class="name" x="18" y="26">evoluciones_clinicas</text>
    <text class="field key" x="18" y="65">PK  id_evolucion      BIGSERIAL</text>
    <text class="field fk" x="18" y="87">FK  id_historia / id_cita / id_especialista</text>
    <text class="field" x="18" y="109">    diagnostico       TEXT</text>
    <text class="field" x="18" y="131">    tratamiento       TEXT</text>
    <text class="field" x="18" y="153">    notas             TEXT</text>
    <text class="field" x="18" y="175">    fecha_registro    TIMESTAMPTZ</text>
  </g>

  <g transform="translate(1000 920)">
    <rect class="box" width="390" height="170" stroke="#f59e0b"/>
    <rect class="head" width="390" height="40" fill="#f59e0b"/>
    <text class="name" x="18" y="26">historial_citas</text>
    <text class="field key" x="18" y="65">PK  id_historial      BIGSERIAL</text>
    <text class="field fk" x="18" y="87">FK  id_cita / cambiado_por</text>
    <text class="field" x="18" y="109">    estado_anterior / estado_nuevo</text>
    <text class="field" x="18" y="131">    comentario        VARCHAR</text>
    <text class="field" x="18" y="153">    fecha_cambio      TIMESTAMPTZ</text>
  </g>

  <g transform="translate(1430 920)">
    <rect class="box" width="330" height="170" stroke="#dc2626"/>
    <rect class="head" width="330" height="40" fill="#dc2626"/>
    <text class="name" x="18" y="26">recuperaciones_password</text>
    <text class="field key" x="18" y="65">PK  id_recuperacion  BIGSERIAL</text>
    <text class="field fk" x="18" y="87">FK  id_usuario       BIGINT</text>
    <text class="field" x="18" y="109">    token_hash       VARCHAR UNIQUE</text>
    <text class="field" x="18" y="131">    fecha_expiracion / fecha_uso</text>
    <text class="field" x="18" y="153">    fecha_creacion   TIMESTAMPTZ</text>
  </g>

  <!-- Leyenda -->
  <g transform="translate(1450 650)">
    <rect class="card" width="270" height="150"/>
    <text class="name" x="18" y="28">LEYENDA</text>
    <text class="legend key" x="18" y="56">PK</text><text class="legend" x="62" y="56">Clave primaria</text>
    <text class="legend fk" x="18" y="82">FK</text><text class="legend" x="62" y="82">Clave foránea</text>
    <line x1="18" y1="106" x2="52" y2="106" class="rel"/>
    <text class="legend" x="62" y="110">Relación entre tablas</text>
    <text class="legend" x="18" y="136">Fuente: database/schema.sql</text>
  </g>

  <text class="note" x="900" y="1165" text-anchor="middle">Modelo inicial listo para PostgreSQL · Las reglas finales de acceso se implementan en el backend</text>
</svg>
