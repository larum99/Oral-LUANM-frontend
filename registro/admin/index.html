<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Panel administrativo de ORAL LUANM.">
  <meta name="author" content="ORAL LUANM">
  <title>Administracion | ORAL LUANM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body data-required-role="admin">
  <div data-component="header"></div>

  <main class="page-main admin-page">
    <section class="section-padding section-bg-white border-bottom">
      <div class="container">
        <div>
          <span class="section-tag">Panel Administrativo</span>
          <h1 class="section-title mb-2">Control general de pacientes y equipo</h1>
          <p class="text-muted mb-0">Gestiona usuarios, roles, permisos, especialistas y citas desde una sola vista.</p>
        </div>
      </div>
    </section>

    <section class="section-padding section-bg-light">
      <div class="container">
        <div class="row g-3 mb-4">
          <div class="col-sm-6 col-xl-3">
            <button class="dashboard-metric dashboard-metric-button is-active" type="button" data-admin-view="users">
              <i class="bi bi-people-fill" aria-hidden="true"></i>
              <span>Usuarios activos</span>
              <strong id="adminUsersCount">0</strong>
            </button>
          </div>
          <div class="col-sm-6 col-xl-3">
            <button class="dashboard-metric dashboard-metric-button" type="button" data-admin-view="appointments">
              <i class="bi bi-calendar2-check-fill" aria-hidden="true"></i>
              <span>Citas de hoy</span>
              <strong id="adminAppointmentsCount">0</strong>
            </button>
          </div>
          <div class="col-sm-6 col-xl-3">
            <button class="dashboard-metric dashboard-metric-button" type="button" data-admin-view="specialists">
              <i class="bi bi-person-badge-fill" aria-hidden="true"></i>
              <span>Especialistas</span>
              <strong id="adminSpecialistsCount">0</strong>
            </button>
          </div>
          <div class="col-sm-6 col-xl-3">
            <button class="dashboard-metric dashboard-metric-button" type="button" data-admin-view="admins">
              <i class="bi bi-shield-lock-fill" aria-hidden="true"></i>
              <span>Administradores</span>
              <strong id="adminAdminsCount">0</strong>
            </button>
          </div>
        </div>

        <section class="admin-panel">
          <div class="panel-heading">
            <div>
              <h2 id="adminWorkspaceTitle">Usuarios activos</h2>
              <p id="adminWorkspaceDescription">Gestiona usuarios, roles y accesos internos.</p>
            </div>
            <a class="btn btn-outline-primary btn-sm" href="../secretario/">
              <i class="bi bi-calendar-plus" aria-hidden="true"></i>
              Abrir Agenda
            </a>
          </div>
          <div id="adminWorkspace"></div>
        </section>
      </div>
    </section>
  </main>

  <div data-component="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/app.js"></script>
</body>
</html>
