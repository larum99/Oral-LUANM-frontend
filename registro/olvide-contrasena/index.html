<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Recuperacion de contrasena ORAL LUANM.">
  <meta name="author" content="ORAL LUANM">
  <title>Olvide mi contrasena | ORAL LUANM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
  <div data-component="header"></div>

  <main class="page-main">
    <section class="section-padding section-bg-light">
      <div class="container">
        <div class="auth-recovery mx-auto">
          <div class="contact-icon mb-3">
            <i class="bi bi-key-fill" aria-hidden="true"></i>
          </div>
          <span class="section-tag">Acceso Seguro</span>
          <h1 class="section-title mb-3">Olvide mi contrasena</h1>
          <p class="text-muted">Ingresa tu correo registrado y te mostraremos un mensaje de recuperacion para continuar el flujo.</p>
          <form class="needs-validation" novalidate id="recoveryForm">
            <div class="mb-3">
              <label for="recoveryEmail" class="form-label fw-semibold">Correo electronico</label>
              <input type="email" class="form-control" id="recoveryEmail" placeholder="Ej. juan@correo.com" required>
              <div class="invalid-feedback">Ingresa un correo valido.</div>
            </div>
            <button type="submit" class="btn btn-primary w-100">Enviar Instrucciones</button>
          </form>
          <a class="d-inline-flex align-items-center gap-2 mt-4 fw-semibold" href="../../">
            <i class="bi bi-arrow-left" aria-hidden="true"></i>
            Volver al inicio
          </a>
        </div>
      </div>
    </section>
  </main>

  <div data-component="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/app.js"></script>
</body>
</html>
